[mod-setting-description]
omb-enabled=When enabled, enemies can establish high-evolution beachheads across deep water on existing saves.
omb-min-evolution=Enemy evolution must be at least this value before beachhead migration can occur. 0.75 means 75%.
omb-cooldown-minutes=Minimum time between successful beachhead migrations per surface.
omb-min-water-tiles=Minimum width (in tiles) of a single continuous water crossing before a beachhead can land on the shore beyond it. Lower = narrower straits count as ocean crossings. Default 16 (half a chunk): rivers are skipped, most straits count.
omb-min-migration-chunks=Minimum straight-line distance, in chunks, from the source nest to the destination beachhead. 1 chunk is 32 tiles. Raise this to prevent short shoreline hops.
omb-scan-step=Tile step used when walking the ray outward from a marooned nest toward the pollution chunk. Lower is more accurate but more expensive.
omb-max-samples-per-attempt=Maximum enemy nests sampled each migration attempt.
omb-nests-per-beachhead=How many nests to place at each successful beachhead.
omb-max-beachheads-per-surface=Safety cap for successful beachheads on each surface.
omb-min-distance-from-player=Prevents beachheads from appearing directly on top of players or their immediate base.
omb-build-islands=EXPERIMENTAL. If enabled, biters can create a small land patch before placing nests. Disabled by default for maximum modpack safety.
omb-landfall-radius=Size of the experimental island patch when island-building is enabled.
omb-budget-scaling=Simple multiplier for migration budget gain. 1.0 is normal, 2.0 is double gain, 0.5 is half gain.
omb-landfall-tile=Tile used for the optional island patch. Auto copies nearby shore terrain, which is best for Alien Biomes compatibility.
omb-use-water-spitters=If the water_spitters mod is active and water-biter-spawner exists, include that nest type in beachheads.
omb-chart-beachheads=Reveal a small area around new beachheads for player forces so the event is visible on the map.
omb-notify=Print a message when enemies establish a new beachhead.
omb-debug=Print diagnostic messages for budget gain, skipped migrations, and failed placement checks. Disabled by default.
omb-budget-max=Maximum stored migration pressure. Set to 0 to disable budget accumulation and effectively disable migrations.
omb-budget-gain-per-minute=Budget gained per minute at 100% enemy evolution. Actual gain is this value multiplied by current enemy evolution.
omb-budget-base-cost=Flat budget cost for each successful ocean migration.
omb-budget-water-cost-per-100=Additional budget cost per 100 tiles of water crossed.
omb-budget-cost-per-nest=Additional budget cost for each nest requested by the beachhead settings.

